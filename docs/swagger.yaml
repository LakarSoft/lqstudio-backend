basePath: /
definitions:
  dto.AddonItemResponse:
    properties:
      addonId:
        type: string
      quantity:
        type: integer
    type: object
  dto.AddonRequest:
    properties:
      addonId:
        type: string
      quantity:
        minimum: 1
        type: integer
    required:
    - addonId
    - quantity
    type: object
  dto.AddonResponse:
    properties:
      description:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      price:
        description: Price per unit in MYR
        type: number
      unit:
        description: Unit of measurement (e.g., "pax", "pc", "person")
        type: string
    type: object
  dto.ApiError:
    properties:
      code:
        type: string
      details:
        additionalProperties: true
        type: object
      message:
        type: string
    type: object
  dto.ApiResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/dto.ApiError'
      message:
        type: string
      meta:
        $ref: '#/definitions/dto.Metadata'
      success:
        type: boolean
    type: object
  dto.AvailabilityResponse:
    properties:
      date:
        description: YYYY-MM-DD
        type: string
      slots:
        items:
          $ref: '#/definitions/dto.AvailableSlotInfo'
        type: array
    type: object
  dto.AvailableSlotInfo:
    properties:
      available:
        description: true if slot is available
        type: boolean
      themeId:
        description: Theme ID for this slot (omitted when checking all themes)
        type: string
      time:
        description: HH:mm format
        type: string
    type: object
  dto.BookingRequest:
    properties:
      addons:
        items:
          $ref: '#/definitions/dto.AddonRequest'
        type: array
      customer:
        $ref: '#/definitions/dto.CustomerInfo'
      packageId:
        type: string
      slots:
        items:
          $ref: '#/definitions/dto.SlotRequest'
        maxItems: 3
        minItems: 1
        type: array
    required:
    - customer
    - packageId
    - slots
    type: object
  dto.BookingResponse:
    properties:
      addons:
        items:
          $ref: '#/definitions/dto.AddonItemResponse'
        type: array
      adminNotes:
        description: Admin-only notes for this booking
        type: string
      createdAt:
        description: ISO 8601 datetime
        type: string
      customer:
        $ref: '#/definitions/dto.CustomerInfo'
      id:
        type: string
      packageId:
        type: string
      paymentScreenshotUrl:
        type: string
      slots:
        items:
          $ref: '#/definitions/dto.SlotResponse'
        type: array
      status:
        description: PENDING | APPROVED | REJECTED | COMPLETED
        type: string
      totalPrice:
        type: number
      updatedAt:
        description: ISO 8601 datetime
        type: string
    type: object
  dto.CreateAddonRequest:
    properties:
      description:
        type: string
      id:
        maxLength: 50
        type: string
      name:
        type: string
      price:
        minimum: 0
        type: number
      unit:
        type: string
    required:
    - id
    - name
    - price
    type: object
  dto.CreatePackageRequest:
    properties:
      description:
        type: string
      discount:
        maximum: 100
        minimum: 0
        type: number
      durationMinutes:
        minimum: 15
        type: integer
      id:
        maxLength: 50
        type: string
      imageUrl:
        type: string
      name:
        type: string
      offers:
        items:
          type: string
        type: array
      price:
        minimum: 0
        type: number
    required:
    - durationMinutes
    - id
    - name
    - price
    type: object
  dto.CreateThemeRequest:
    properties:
      description:
        type: string
      id:
        maxLength: 50
        type: string
      imageUrl:
        type: string
      name:
        type: string
      price:
        description: Optional - defaults to 0 if not provided
        type: number
    required:
    - description
    - id
    - imageUrl
    - name
    type: object
  dto.CustomerInfo:
    properties:
      email:
        type: string
      name:
        type: string
      notes:
        type: string
      phone:
        type: string
    required:
    - email
    - name
    - phone
    type: object
  dto.Metadata:
    properties:
      request_id:
        type: string
      timestamp:
        type: string
    type: object
  dto.PackageResponse:
    properties:
      basePrice:
        description: Same as price (for frontend compatibility)
        type: number
      description:
        type: string
      discount:
        description: Discount percentage (0-100)
        type: number
      durationMinutes:
        type: integer
      finalPrice:
        description: 'Calculated: price * (1 - discount/100)'
        type: number
      id:
        type: string
      imageUrl:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      offers:
        description: List of features/benefits
        items:
          type: string
        type: array
      price:
        description: Base price in MYR
        type: number
    type: object
  dto.PaginatedBookingsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.BookingResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationInfo'
    type: object
  dto.PaginationInfo:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.SlotRequest:
    properties:
      date:
        description: ISO date string (YYYY-MM-DD)
        type: string
      themeId:
        description: Required for 1/2-slot packages; omitted for studio-level (3-slot)
          packages — backend auto-assigns all themes
        type: string
      time:
        description: Time in HH:mm format (e.g., "10:00")
        type: string
    required:
    - date
    - time
    type: object
  dto.SlotResponse:
    properties:
      date:
        description: ISO date string (YYYY-MM-DD)
        type: string
      themeId:
        description: Foreign key to Theme
        type: string
      time:
        description: Time in HH:mm format
        type: string
    type: object
  dto.ThemeResponse:
    properties:
      description:
        type: string
      id:
        type: string
      imageUrl:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      price:
        description: Additional cost in MYR (currently 0 for all themes)
        type: number
    type: object
  dto.UpdateAddonRequest:
    properties:
      description:
        type: string
      id:
        maxLength: 50
        type: string
      isActive:
        type: boolean
      name:
        type: string
      price:
        minimum: 0
        type: number
      unit:
        type: string
    required:
    - id
    - name
    - price
    type: object
  dto.UpdateAdminNotesRequest:
    properties:
      adminNotes:
        type: string
    type: object
  dto.UpdateBookingRequest:
    properties:
      addons:
        items:
          $ref: '#/definitions/dto.AddonRequest'
        type: array
      customer:
        $ref: '#/definitions/dto.CustomerInfo'
      slots:
        items:
          $ref: '#/definitions/dto.SlotRequest'
        maxItems: 3
        minItems: 1
        type: array
    required:
    - customer
    - slots
    type: object
  dto.UpdateBookingStatusRequest:
    properties:
      adminNotes:
        type: string
      status:
        enum:
        - PENDING
        - APPROVED
        - REJECTED
        - COMPLETED
        type: string
    required:
    - status
    type: object
  dto.UpdateBookingStatusResponse:
    properties:
      booking:
        $ref: '#/definitions/dto.BookingResponse'
      emailError:
        type: string
      emailNotificationSent:
        type: boolean
    type: object
  dto.UpdatePackageRequest:
    properties:
      description:
        type: string
      discount:
        maximum: 100
        minimum: 0
        type: number
      durationMinutes:
        minimum: 15
        type: integer
      id:
        maxLength: 50
        type: string
      imageUrl:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      offers:
        items:
          type: string
        type: array
      price:
        minimum: 0
        type: number
    required:
    - durationMinutes
    - id
    - name
    - price
    type: object
  dto.UpdateThemeRequest:
    properties:
      description:
        type: string
      id:
        maxLength: 50
        type: string
      imageUrl:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      price:
        description: Optional - defaults to 0 if not provided
        type: number
    required:
    - description
    - id
    - imageUrl
    - name
    type: object
  handlers.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  handlers.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/handlers.UserInfo'
    type: object
  handlers.UserInfo:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@lqstudio.com
    name: API Support
  description: API for photography studio booking system
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: LQ Studio Photography Booking API
  version: "1.0"
paths:
  /api/addons:
    get:
      consumes:
      - application/json
      description: Get list of all active add-ons available for booking
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.AddonResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      summary: Get active add-ons
      tags:
      - addons
  /api/admin/addons:
    get:
      consumes:
      - application/json
      description: Get list of all add-ons including inactive ones (admin only)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.AddonResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: Get all add-ons (Admin)
      tags:
      - admin-addons
    post:
      consumes:
      - application/json
      description: Create a new add-on (admin only)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Add-on data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAddonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.AddonResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: Create new add-on (Admin)
      tags:
      - admin-addons
  /api/admin/addons/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an add-on (admin only)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Add-on ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: Delete add-on (Admin)
      tags:
      - admin-addons
    get:
      consumes:
      - application/json
      description: Get a single add-on by ID (admin only)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Add-on ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.AddonResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: Get add-on by ID (Admin)
      tags:
      - admin-addons
    put:
      consumes:
      - application/json
      description: Update an existing add-on (admin only)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Add-on ID
        in: path
        name: id
        required: true
        type: string
      - description: Add-on data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateAddonRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.AddonResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: Update add-on (Admin)
      tags:
      - admin-addons
  /api/admin/addons/{id}/toggle-active:
    patch:
      consumes:
      - application/json
      description: Toggle add-on active/inactive status (admin only)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Add-on ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.AddonResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: Toggle add-on active status (Admin)
      tags:
      - admin-addons
  /api/admin/bookings:
    get:
      consumes:
      - application/json
      description: Get list of all bookings with filters, search, sorting, and pagination
        (admin only)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filter by status
        enum:
        - PENDING
        - APPROVED
        - REJECTED
        - COMPLETED
        in: query
        name: status
        type: string
      - description: Filter by customer email (partial match)
        in: query
        name: email
        type: string
      - description: Filter by package ID
        in: query
        name: packageId
        type: string
      - description: Filter by theme ID
        in: query
        name: themeId
        type: string
      - description: Filter by slot date (YYYY-MM-DD)
        in: query
        name: slotDate
        type: string
      - description: Filter by slot date from (YYYY-MM-DD)
        in: query
        name: dateFrom
        type: string
      - description: Filter by slot date to (YYYY-MM-DD)
        in: query
        name: dateTo
        type: string
      - description: Search customer name, email, or phone
        in: query
        name: search
        type: string
      - default: createdAt
        description: Sort field
        enum:
        - createdAt
        - updatedAt
        - totalPrice
        - status
        in: query
        name: sortBy
        type: string
      - default: desc
        description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginatedBookingsResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: List all bookings (Admin)
      tags:
      - admin-bookings
  /api/admin/bookings/{id}:
    get:
      consumes:
      - application/json
      description: Get a single booking by ID (admin only)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.BookingResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: Get booking by ID (Admin)
      tags:
      - admin-bookings
    put:
      consumes:
      - application/json
      description: |-
        Update an existing booking's slots, addons, and customer info. Admin only.
        Only PENDING and APPROVED bookings can be updated.

        **Payload is the same as CreateBooking minus packageId.**

        **1/2-slot packages** — include themeId per slot:
        ```json
        { "slots": [{ "date": "2026-03-10", "time": "10:00 AM", "themeId": "theme-A" }], "addons": [], "customer": { "name": "Anas", "email": "anas@example.com", "phone": "0123456789" } }
        ```

        **3-slot studio packages** — omit themeId, send exactly 3 consecutive slots:
        ```json
        { "slots": [{ "date": "2026-03-10", "time": "10:00 AM" }, { "date": "2026-03-10", "time": "10:20 AM" }, { "date": "2026-03-10", "time": "10:40 AM" }], "addons": [], "customer": { "name": "Anas", "email": "anas@example.com", "phone": "0123456789" } }
        ```
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated booking data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateBookingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.BookingResponse'
              type: object
        "400":
          description: Invalid request or wrong slot count
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "403":
          description: Forbidden – requires ADMIN role
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "404":
          description: Booking not found
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "409":
          description: One or more requested slots are already booked
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "422":
          description: Booking is in a terminal status (REJECTED or COMPLETED)
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: Update booking (admin)
      tags:
      - admin
  /api/admin/bookings/{id}/notes:
    patch:
      consumes:
      - application/json
      description: Update the internal admin notes for a booking without changing
        its status (admin only)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      - description: Admin notes data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateAdminNotesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.BookingResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: Update booking admin notes (Admin)
