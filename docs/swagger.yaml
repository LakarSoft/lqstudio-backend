  /api/bookings:
    post:
      consumes:
      - application/json
      description: |-
        Create a new booking (customer-facing, no auth required).

        **Slot rules depend on the package type:**

        **1-slot / 2-slot packages** — send exactly 1 or 2 slots, each with a `themeId`:
        ```json
        {
        "packageId": "pkg-single",
        "slots": [
        { "date": "2026-02-24", "time": "2:20 PM", "themeId": "theme-A" }
        ],
        "addons": [],
        "customer": { "name": "Anas", "email": "anas@example.com", "phone": "0123456789" }
        }
        ```

        **Studio-level (3-slot / 60-min) packages** — send exactly 3 time slots **without** `themeId`.
        The backend automatically books every active theme for those 3 slots.
        Sending `themeId` is harmless but it will be ignored.
        ```json
        {
        "packageId": "pkg-studio",
        "slots": [
        { "date": "2026-02-24", "time": "2:20 PM" },
        { "date": "2026-02-24", "time": "2:40 PM" },
        { "date": "2026-02-24", "time": "3:00 PM" }
        ],
        "addons": [],
        "customer": { "name": "Anas", "email": "anas@example.com", "phone": "0123456789" }
        }
        ```
      parameters:
      - description: Booking data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.BookingResponse'
              type: object
        "400":
          description: Invalid request, wrong slot count, or missing themeId for non-studio
            package
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "404":
          description: Package, theme, or addon not found
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "409":
          description: One or more requested slots are already booked
          schema:
            $ref: '#/definitions/dto.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ApiResponse'
      summary: Create new booking
      tags:
      - bookings
  /api/bookings/{id}:
    get:
      consumes:
      - application/json
      description: Get a booking by ID (public - for customers to check their booking)
